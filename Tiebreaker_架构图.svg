<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1420" viewBox="0 0 1600 1420">
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#51637a"/></marker><style>text{font-family:Arial,'Microsoft YaHei',sans-serif;fill:#172033}.t{font-size:34px;font-weight:700}.s{font-size:20px;font-weight:700}.b{font-size:17px}.small{font-size:14px;fill:#53627a}.box{stroke-width:2;rx:18}.line{stroke:#51637a;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1600" height="1420" fill="#f7f9fc"/><text x="70" y="68" class="t">Tiebreaker｜双 STM32H723 实时机器人控制架构</text><text x="70" y="100" class="small">源码：Chassis + Gimbal 独立 Keil 工程 · STM32 HAL · FreeRTOS · CAN / UART / USB CDC</text>
<rect x="70" y="145" width="1460" height="120" class="box" fill="#e9f2ff" stroke="#7aa5e8"/><text x="105" y="186" class="s">外部设备与输入</text><text x="105" y="224" class="b">DR16 遥控器（UART）　 裁判系统（UART）　 视觉设备（USB CDC）　 IMU / 电机反馈（CAN）</text>
<rect x="70" y="330" width="1460" height="120" class="box" fill="#eefaf4" stroke="#6fbd94"/><text x="105" y="370" class="s">协议解析 / BSP 适配</text><text x="105" y="408" class="b">DR16 · Judge + CRC · Vision · CAN 电机/IMU · UART DMA · 功率/超级电容 · 数据滤波</text>
<path d="M800 265V330" class="line"/>
<rect x="70" y="525" width="680" height="270" class="box" fill="#fff3e6" stroke="#e4a65f"/><text x="105" y="570" class="s">Gimbal 控制器｜STM32H723 + FreeRTOS</text><text x="105" y="612" class="b">模式管理：PROTECT / REMOTER / AUTO + 解锁保护</text><text x="105" y="647" class="b">云台任务：IMU / 视觉 / 串级 PID</text><text x="105" y="682" class="b">射击任务：摩擦轮 / 拨弹</text><text x="105" y="717" class="b">裁判与 UI、USB、CAN 统一发送</text><text x="105" y="759" class="small">main → 模块初始化 → MX_FREERTOS_Init → osKernelStart</text>
<rect x="850" y="525" width="680" height="270" class="box" fill="#f3edff" stroke="#9b83d6"/><text x="885" y="570" class="s">Chassis 控制器｜STM32H723 + FreeRTOS</text><text x="885" y="612" class="b">底盘模式与状态任务</text><text x="885" y="647" class="b">速度分配 / 舵轮运动学 / 底盘 PID</text><text x="885" y="682" class="b">超级电容与功率控制</text><text x="885" y="717" class="b">CAN 发送 / 调试任务</text><text x="885" y="759" class="small">main → 模块初始化 → MX_FREERTOS_Init → osKernelStart</text>
<path d="M800 450V525" class="line"/><path d="M750 660H850" class="line"/><text x="745" y="635" class="small">控制/状态 CAN</text>
<rect x="250" y="860" width="1100" height="105" class="box" fill="#eaf7f7" stroke="#4ca7a5"/><text x="290" y="903" class="s">统一执行出口</text><text x="290" y="937" class="b">控制任务生成电流 → RTOS Signal → CAN Send Task → 模式 / 解锁 / 功率门控 → 执行机构</text>
<path d="M410 795V860" class="line"/><path d="M1190 795V860" class="line"/>
<rect x="70" y="1015" width="710" height="315" class="box" fill="#fff3e6" stroke="#e4a65f"/><text x="105" y="1055" class="s">Chassis 实际任务与中断</text><text x="105" y="1090" class="b">任务：sys_init（启动后退出）· CAN发送（信号阻塞）· 底盘控制（2 ms）</text><text x="105" y="1122" class="b">　　　状态监控（100 ms）· 调试（10 ms）· Start（100 ms）</text><text x="105" y="1164" class="b">业务 IRQ：USART1/2/6（IDLE + DMA）· FDCAN1 FIFO0</text><text x="105" y="1196" class="b">　　　　　FDCAN2 FIFO0/1 · FDCAN3 FIFO1</text><text x="105" y="1238" class="small">DMA/SPI/TIM1/USART3/10：HAL 服务或时间基准，不直接运行控制算法</text><text x="105" y="1270" class="small">接收 ISR 更新共享反馈；chassis_task 以 2 ms 周期读取</text>
<rect x="820" y="1015" width="710" height="315" class="box" fill="#f3edff" stroke="#9b83d6"/><text x="855" y="1055" class="s">Gimbal 实际任务与中断</text><text x="855" y="1090" class="b">任务：CAN发送（信号阻塞）· USB发送（队列阻塞）· 状态（20 ms）</text><text x="855" y="1122" class="b">　　　底盘/云台/射击（各 2 ms）· 模式（6 ms）· 跨板（10 ms）</text><text x="855" y="1154" class="b">　　　裁判发送（100 ms）· 调试（3 ms）· Start（USB 初始化）</text><text x="855" y="1196" class="b">业务 IRQ：USART1/2/6 · FDCAN1/2 FIFO0/1 · FDCAN3 FIFO1</text><text x="855" y="1228" class="b">　　　　　OTG_HS → USB CDC / 视觉数据解包</text><text x="855" y="1270" class="small">TIM3、DMA、SPI、TIM1、USART3/10：HAL 服务或时间基准</text>
</svg>
