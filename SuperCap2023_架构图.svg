<rect x="100" y="825" width="1400" height="110" class="box" fill="#eaf7f7" stroke="#4ca7a5"/><text x="135" y="870" class="s">中断驱动实时调度</text><text x="135" y="907" class="b">TIM7 ≈ 5 kHz：ADC 读取 + 功率输出　｜　TIM6 ≈ 500 Hz：故障/状态机/调试　｜　TIM16 ≈ 50 Hz：缓存功率/温度　｜　DMA：ADC、UART、HRTIM</text>
