<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#51637a"/></marker><style>text{font-family:Arial,'Microsoft YaHei',sans-serif;fill:#172033}.t{font-size:34px;font-weight:700}.s{font-size:20px;font-weight:700}.b{font-size:17px}.small{font-size:14px;fill:#53627a}.box{stroke-width:2;rx:18}.line{stroke:#51637a;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1600" height="1040" fill="#f7f9fc"/><text x="70" y="68" class="t">SuperCap2023｜STM32G474 Buck/Boost 超级电容控制架构</text><text x="70" y="100" class="small">源码：裸机 C · STM32 HAL · DMA + IRQ 驱动 · ADC / FDCAN / HRTIM / UART</text>
<rect x="70" y="150" width="300" height="190" class="box" fill="#e9f2ff" stroke="#7aa5e8"/><text x="100" y="192" class="s">采样输入</text><text x="100" y="230" class="b">ADC1~4 + DMA</text><text x="100" y="262" class="b">电池 V/I</text><text x="100" y="292" class="b">底盘 V/I</text><text x="100" y="322" class="b">电容 V/I / 温度</text>
<rect x="455" y="150" width="300" height="190" class="box" fill="#eefaf4" stroke="#6fbd94"/><text x="485" y="192" class="s">外部状态</text><text x="485" y="230" class="b">USART1 + DMA</text><text x="485" y="262" class="b">裁判系统 / CRC</text><text x="485" y="302" class="b">功率上限、热量</text>
<rect x="840" y="150" width="300" height="190" class="box" fill="#f3edff" stroke="#9b83d6"/><text x="870" y="192" class="s">底盘协同</text><text x="870" y="230" class="b">FDCAN2 IRQ</text><text x="870" y="272" class="b">底盘模式 / 指令</text>
<rect x="1225" y="150" width="300" height="190" class="box" fill="#fff3e6" stroke="#e4a65f"/><text x="1255" y="192" class="s">调试观察</text><text x="1255" y="230" class="b">USART2</text><text x="1255" y="272" class="b">DataScope / VOFA+</text>
<rect x="70" y="450" width="340" height="240" class="box" fill="#eefaf4" stroke="#6fbd94"/><text x="100" y="493" class="s">数据处理</text><text x="100" y="533" class="b">量纲换算 / ADC 校准</text><text x="100" y="568" class="b">低通 / 平均 / Kalman</text><text x="100" y="603" class="b">裁判与 CAN 协议解析</text><text x="100" y="643" class="small">bat / chassis / cap 运行数据</text>
<rect x="535" y="410" width="530" height="320" class="box" fill="#fff7df" stroke="#d5a640"/><text x="570" y="453" class="s">核心功率控制｜power_ctrl_task.c</text><text x="570" y="498" class="b">bufferCalc：缓存能量与功率上限</text><text x="570" y="538" class="b">故障检测：电压 / 电流 / 通信丢失</text><text x="570" y="578" class="b">状态机：PROTECT → RESTART → NORMAL</text><text x="570" y="618" class="b">四级 PID：Buffer / Power / Current / Charge Voltage</text><text x="570" y="663" class="small">能量目标 → 功率 → 电流 → 占空比</text>
<rect x="1190" y="450" width="335" height="240" class="box" fill="#fff0f0" stroke="#dd8282"/><text x="1220" y="493" class="s">功率输出与回传</text><text x="1220" y="533" class="b">pwmCalc / pwmSetCompare</text><text x="1220" y="568" class="b">HRTIM1 + DMA</text><text x="1220" y="603" class="b">Buck / Boost MOS 功率级</text><text x="1220" y="643" class="b">FDCAN2 状态回传</text>
